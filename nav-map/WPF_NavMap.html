<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>WPF driver-client — Visual Navigation Map</title>
<style>
  :root {
    --bg: #0E1A2B;
    --panel: #1B2D47;
    --panel2: #1A2636;
    --text: #ffffff;
    --muted: #9bb;
    --cyan: #00E0FF;
    --green: #27AE60;
    --orange: #F39C12;
    --red: #E74C3C;
    --grey: #bdbdbd;
  }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; }
  header { padding: 16px 24px; border-bottom: 2px solid var(--cyan); position: sticky; top: 0; background: var(--bg); z-index: 5; }
  header h1 { margin: 0; color: var(--cyan); font-size: 22px; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; font-size: 13px; }
  .chip { padding: 4px 12px; border-radius: 14px; font-weight: 600; }
  .chip.auth { background:#1a2e50; border:1px solid var(--cyan); color: var(--cyan); }
  .chip.student { background:#16321f; border:1px solid var(--green); color: var(--green); }
  .chip.teacher { background:#3d2a14; border:1px solid var(--orange); color: var(--orange); }
  .chip.admin { background:#3d1414; border:1px solid var(--red); color: var(--red); }
  .chip.shared { background:#1f1f2e; border:1px solid var(--grey); color: var(--grey); }
  .controls { margin-top: 8px; font-size: 13px; color: var(--muted); }
  .controls label { margin-right: 14px; }
  .controls input[type="checkbox"] { vertical-align: middle; }

  .canvas-wrap { overflow: auto; padding: 24px; }
  .canvas {
    position: relative;
    margin: 0 auto;
    /* dimensions set by JS */
  }
  svg.edges {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    overflow: visible;
  }
  svg.edges path { fill: none; stroke-width: 1.6; opacity: 0.6; }
  svg.edges path.auth    { stroke: var(--cyan); }
  svg.edges path.student { stroke: var(--green); }
  svg.edges path.teacher { stroke: var(--orange); }
  svg.edges path.admin   { stroke: var(--red); }
  svg.edges path.shared  { stroke: var(--grey); }
  svg.edges path:hover { opacity: 1; stroke-width: 2.5; }
  svg.edges text.edge-label {
    fill: #fff;
    font-size: 10px;
    paint-order: stroke;
    stroke: #0E1A2B;
    stroke-width: 3px;
    stroke-linejoin: round;
    pointer-events: none;
  }

  .node {
    position: absolute;
    width: 200px;
    height: 160px;
    border-radius: 10px;
    background: var(--panel);
    border: 2px solid var(--cyan);
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .node:hover {
    transform: scale(1.04);
    box-shadow: 0 6px 22px rgba(0, 224, 255, 0.4);
    z-index: 4;
  }
  .node.auth    { border-color: var(--cyan); }
  .node.student { border-color: var(--green); }
  .node.teacher { border-color: var(--orange); }
  .node.admin   { border-color: var(--red); }
  .node.shared  { border-color: var(--grey); }

  .node img {
    width: 100%;
    height: 124px;
    object-fit: cover;
    display: block;
    background: #0a1422;
  }
  .node .name {
    padding: 4px 6px;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    background: #0E1A2B;
    color: #fff;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 1px solid #233;
  }
  .node.auth .name    { color: var(--cyan); }
  .node.student .name { color: var(--green); }
  .node.teacher .name { color: var(--orange); }
  .node.admin .name   { color: var(--red); }
  .node.shared .name  { color: var(--grey); }

  /* zone backdrops */
  .zone {
    position: absolute;
    border: 1px dashed rgba(255,255,255,0.12);
    border-radius: 14px;
    pointer-events: none;
  }
  .zone .label {
    position: absolute;
    top: 8px; left: 14px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.6;
  }
  .zone.auth    { background: rgba(0, 224, 255, 0.04); }
  .zone.auth .label    { color: var(--cyan); }
  .zone.student { background: rgba(39, 174, 96, 0.04); }
  .zone.student .label { color: var(--green); }
  .zone.teacher { background: rgba(243, 156, 18, 0.04); }
  .zone.teacher .label { color: var(--orange); }
  .zone.admin   { background: rgba(231, 76, 60, 0.04); }
  .zone.admin .label   { color: var(--red); }
  .zone.shared  { background: rgba(189, 189, 189, 0.04); }
  .zone.shared .label  { color: var(--grey); }
</style>
</head>
<body>

<header>
  <h1>🚗 WPF driver-client — Navigation Map</h1>
  <div class="legend">
    <span class="chip auth">🟦 Auth</span>
    <span class="chip student">🟩 Student</span>
    <span class="chip teacher">🟧 Teacher</span>
    <span class="chip admin">🟥 Admin</span>
    <span class="chip shared">⬜ Shared</span>
  </div>
  <div class="controls">
    <label><input type="checkbox" id="toggle-labels" checked /> Edge labels</label>
    <label><input type="checkbox" id="toggle-back" checked /> "Back" arrows</label>
  </div>
</header>

<div class="canvas-wrap">
  <div class="canvas" id="canvas">
    <svg class="edges" id="edges">
      <defs>
        <marker id="arrow-cyan"   markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#00E0FF"/></marker>
        <marker id="arrow-green"  markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#27AE60"/></marker>
        <marker id="arrow-orange" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#F39C12"/></marker>
        <marker id="arrow-red"    markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#E74C3C"/></marker>
        <marker id="arrow-grey"   markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#bdbdbd"/></marker>
      </defs>
    </svg>
  </div>
</div>

<script>
// ===== Layout config =====
const NODE_W = 200, NODE_H = 160;
const CELL_W = 240, CELL_H = 200;     // grid cell pitch
const PAD_X = 40, PAD_Y = 40;

// col, row in conceptual grid
const NODES = [
  // Auth zone (top, full width-ish)
  { id: "MainWindow",                zone: "auth",    col: 0,  row: 0 },
  { id: "RoleSelection",             zone: "auth",    col: 2,  row: 0 },
  { id: "LogIn",                     zone: "auth",    col: 4,  row: 0 },
  { id: "Rewiews",                   zone: "auth",    col: 0,  row: 1 },
  { id: "ChooseTeacher",             zone: "auth",    col: 2,  row: 1 },
  { id: "SignUp",                    zone: "auth",    col: 4,  row: 1 },

  // Student zone (left middle/bottom)
  { id: "StudentUI",                 zone: "student", col: 1,  row: 3 },
  { id: "ScheduleLesson",            zone: "student", col: 0,  row: 4 },
  { id: "ViewLessons",               zone: "student", col: 1,  row: 4 },
  { id: "WriteRewiew",               zone: "student", col: 2,  row: 4 },
  { id: "StudentPayment",            zone: "student", col: 0,  row: 5 },
  { id: "StudentNotifications",      zone: "student", col: 2,  row: 5 },

  // Teacher zone (right middle)
  { id: "TeacherUI",                 zone: "teacher", col: 7,  row: 3 },
  { id: "AllStudents",               zone: "teacher", col: 5,  row: 4 },
  { id: "Teacher_Schedule",          zone: "teacher", col: 6,  row: 4 },
  { id: "TeacherPaymentReports",     zone: "teacher", col: 7,  row: 4 },
  { id: "TeacherConfirmPayments",    zone: "teacher", col: 8,  row: 4 },
  { id: "TeacherNotifications",      zone: "teacher", col: 9,  row: 4 },
  { id: "CalendarTeacher",           zone: "teacher", col: 5,  row: 5 },
  { id: "TeacherSettings",           zone: "teacher", col: 8,  row: 5 },
  { id: "StudentPricingManagement",  zone: "teacher", col: 9,  row: 5 },

  // Admin zone (far right bottom)
  { id: "AdminDashboard",            zone: "admin",   col: 7,  row: 6 },
  { id: "AdminTicketManagement",     zone: "admin",   col: 6,  row: 7 },
  { id: "AdminUserManagement",       zone: "admin",   col: 8,  row: 7 },
  { id: "AdminTicketDetails",        zone: "admin",   col: 6,  row: 8 },

  // Shared zone (middle bottom)
  { id: "Chat",                      zone: "shared",  col: 3,  row: 6 },
  { id: "MyTickets",                 zone: "shared",  col: 4,  row: 6 },
  { id: "CreateTicket",              zone: "shared",  col: 3,  row: 7 },
  { id: "TicketDetails",             zone: "shared",  col: 4,  row: 7 }
];

// ===== Edges (button -> destination) =====
// "back" flag flips a styling and lets users hide all back arrows.
const EDGES = [
  // Auth flow
  { from: "MainWindow",        to: "RoleSelection",            label: "on load",                  zone: "auth" },
  { from: "RoleSelection",     to: "ChooseTeacher",            label: "Student card",             zone: "auth" },
  { from: "RoleSelection",     to: "SignUp",                   label: "Teacher card",             zone: "auth" },
  { from: "RoleSelection",     to: "LogIn",                    label: "Login link",               zone: "auth" },
  { from: "LogIn",             to: "RoleSelection",            label: "Sign Up btn",              zone: "auth", back: true },
  { from: "LogIn",             to: "TeacherUI",                label: "Sign In (teacher)",        zone: "teacher" },
  { from: "LogIn",             to: "StudentUI",                label: "Sign In (student)",        zone: "student" },
  { from: "SignUp",            to: "RoleSelection",            label: "Back",                     zone: "auth", back: true },
  { from: "SignUp",            to: "ChooseTeacher",            label: "Choose Teacher / Register",zone: "auth" },
  { from: "ChooseTeacher",     to: "SignUp",                   label: "Choose btn",               zone: "auth" },
  { from: "ChooseTeacher",     to: "Rewiews",                  label: "See Reviews",              zone: "auth" },
  { from: "ChooseTeacher",     to: "RoleSelection",            label: "Back (chooseMode)",        zone: "auth", back: true },
  { from: "ChooseTeacher",     to: "StudentUI",                label: "Back (review mode)",       zone: "student", back: true },
  { from: "Rewiews",           to: "ChooseTeacher",            label: "Back",                     zone: "auth", back: true },

  // Student dashboard spokes
  { from: "StudentUI",         to: "ScheduleLesson",           label: "Schedule Lesson",          zone: "student" },
  { from: "StudentUI",         to: "ViewLessons",              label: "My Lessons",               zone: "student" },
  { from: "StudentUI",         to: "WriteRewiew",              label: "Write Review",             zone: "student" },
  { from: "StudentUI",         to: "StudentPayment",           label: "Payments",                 zone: "student" },
  { from: "StudentUI",         to: "StudentNotifications",     label: "Notifications",            zone: "student" },
  { from: "StudentUI",         to: "ChooseTeacher",            label: "See Reviews",              zone: "student" },
  { from: "StudentUI",         to: "Chat",                     label: "Chat",                     zone: "shared" },
  { from: "StudentUI",         to: "MyTickets",                label: "Support Tickets",          zone: "shared" },
  { from: "StudentUI",         to: "LogIn",                    label: "Logout",                   zone: "auth" },
  { from: "ScheduleLesson",    to: "StudentUI",                label: "Confirm / Back",           zone: "student", back: true },
  { from: "WriteRewiew",       to: "StudentUI",                label: "Submit / Back",            zone: "student", back: true },
  { from: "ViewLessons",       to: "StudentUI",                label: "Back",                     zone: "student", back: true },
  { from: "StudentPayment",    to: "StudentUI",                label: "Pay OK / Back",            zone: "student", back: true },
  { from: "StudentNotifications", to: "StudentUI",             label: "Back",                     zone: "student", back: true },

  // Teacher dashboard spokes
  { from: "TeacherUI",         to: "AdminDashboard",           label: "Admin Dashboard (IsAdmin)",zone: "admin" },
  { from: "TeacherUI",         to: "AllStudents",              label: "My Students",              zone: "teacher" },
  { from: "TeacherUI",         to: "CalendarTeacher",          label: "Calendar",                 zone: "teacher" },
  { from: "TeacherUI",         to: "Teacher_Schedule",         label: "Schedule",                 zone: "teacher" },
  { from: "TeacherUI",         to: "TeacherPaymentReports",    label: "Payment Reports",          zone: "teacher" },
  { from: "TeacherUI",         to: "TeacherConfirmPayments",   label: "Confirm Payments",         zone: "teacher" },
  { from: "TeacherUI",         to: "TeacherNotifications",     label: "Notifications",            zone: "teacher" },
  { from: "TeacherUI",         to: "Chat",                     label: "Chat",                     zone: "shared" },
  { from: "TeacherUI",         to: "MyTickets",                label: "Support Tickets",          zone: "shared" },
  { from: "TeacherUI",         to: "TeacherSettings",          label: "Settings",                 zone: "teacher" },
  { from: "TeacherUI",         to: "LogIn",                    label: "Logout",                   zone: "auth" },
  { from: "AllStudents",       to: "TeacherUI",                label: "Back",                     zone: "teacher", back: true },
  { from: "Teacher_Schedule",  to: "TeacherUI",                label: "Back",                     zone: "teacher", back: true },
  { from: "TeacherPaymentReports",   to: "TeacherUI",          label: "Back",                     zone: "teacher", back: true },
  { from: "TeacherConfirmPayments",  to: "TeacherUI",          label: "Back",                     zone: "teacher", back: true },
  { from: "TeacherNotifications",    to: "TeacherUI",          label: "Back",                     zone: "teacher", back: true },
  { from: "CalendarTeacher",   to: "TeacherUI",                label: "Back",                     zone: "teacher", back: true },
  { from: "TeacherSettings",   to: "TeacherUI",                label: "Back",                     zone: "teacher", back: true },
  { from: "TeacherSettings",   to: "StudentPricingManagement", label: "Manage Student Prices",    zone: "teacher" },
  { from: "StudentPricingManagement", to: "TeacherSettings",   label: "Back",                     zone: "teacher", back: true },

  // Admin
  { from: "AdminDashboard",        to: "AdminTicketManagement", label: "Ticket Management",      zone: "admin" },
  { from: "AdminDashboard",        to: "AdminUserManagement",   label: "User Management",        zone: "admin" },
  { from: "AdminDashboard",        to: "TeacherUI",             label: "Back",                   zone: "admin", back: true },
  { from: "AdminTicketManagement", to: "AdminTicketDetails",    label: "View / Take / Resolve",  zone: "admin" },
  { from: "AdminTicketManagement", to: "AdminDashboard",        label: "Back",                   zone: "admin", back: true },
  { from: "AdminUserManagement",   to: "AdminDashboard",        label: "Back",                   zone: "admin", back: true },
  { from: "AdminTicketDetails",    to: "AdminTicketManagement", label: "Resolve & Close / Back", zone: "admin", back: true },

  // Shared
  { from: "Chat",          to: "TeacherUI",     label: "Back (Teacher)",  zone: "shared", back: true },
  { from: "Chat",          to: "StudentUI",     label: "Back (Student)",  zone: "shared", back: true },
  { from: "MyTickets",     to: "CreateTicket",  label: "New Ticket",      zone: "shared" },
  { from: "MyTickets",     to: "TicketDetails", label: "Open Ticket row", zone: "shared" },
  { from: "MyTickets",     to: "TeacherUI",     label: "Back (Teacher)",  zone: "shared", back: true },
  { from: "MyTickets",     to: "StudentUI",     label: "Back (Student)",  zone: "shared", back: true },
  { from: "CreateTicket",  to: "MyTickets",     label: "After create",    zone: "shared" },
  { from: "CreateTicket",  to: "TeacherUI",     label: "Cancel (Teacher)",zone: "shared", back: true },
  { from: "CreateTicket",  to: "StudentUI",     label: "Cancel (Student)",zone: "shared", back: true },
  { from: "TicketDetails", to: "MyTickets",     label: "Back",            zone: "shared", back: true }
];

// ===== Build DOM =====
const canvas = document.getElementById("canvas");
const svg = document.getElementById("edges");

const maxCol = Math.max(...NODES.map(n => n.col));
const maxRow = Math.max(...NODES.map(n => n.row));
const W = PAD_X * 2 + (maxCol + 1) * CELL_W;
const H = PAD_Y * 2 + (maxRow + 1) * CELL_H;
canvas.style.width  = W + "px";
canvas.style.height = H + "px";
svg.setAttribute("width", W);
svg.setAttribute("height", H);

// Zone backdrops
const ZONES_BOX = {
  auth:    { ids: ["MainWindow","RoleSelection","LogIn","SignUp","ChooseTeacher","Rewiews"],     label: "AUTH" },
  student: { ids: ["StudentUI","ScheduleLesson","ViewLessons","WriteRewiew","StudentPayment","StudentNotifications"], label: "STUDENT" },
  teacher: { ids: ["TeacherUI","AllStudents","Teacher_Schedule","TeacherPaymentReports","TeacherConfirmPayments","TeacherNotifications","CalendarTeacher","TeacherSettings","StudentPricingManagement"], label: "TEACHER" },
  admin:   { ids: ["AdminDashboard","AdminTicketManagement","AdminUserManagement","AdminTicketDetails"], label: "ADMIN" },
  shared:  { ids: ["Chat","MyTickets","CreateTicket","TicketDetails"], label: "SHARED" }
};

function nodePos(n) {
  const x = PAD_X + n.col * CELL_W;
  const y = PAD_Y + n.row * CELL_H;
  return { x, y, cx: x + NODE_W / 2, cy: y + NODE_H / 2 };
}

function drawZones() {
  const lookup = Object.fromEntries(NODES.map(n => [n.id, n]));
  for (const [key, z] of Object.entries(ZONES_BOX)) {
    const pts = z.ids.map(id => nodePos(lookup[id]));
    if (!pts.length) continue;
    const minX = Math.min(...pts.map(p => p.x)) - 18;
    const minY = Math.min(...pts.map(p => p.y)) - 30;
    const maxX = Math.max(...pts.map(p => p.x + NODE_W)) + 18;
    const maxY = Math.max(...pts.map(p => p.y + NODE_H)) + 18;

    const div = document.createElement("div");
    div.className = "zone " + key;
    div.style.left = minX + "px";
    div.style.top = minY + "px";
    div.style.width = (maxX - minX) + "px";
    div.style.height = (maxY - minY) + "px";
    const lab = document.createElement("div");
    lab.className = "label";
    lab.textContent = z.label;
    div.appendChild(lab);
    canvas.appendChild(div);
  }
}

function drawNodes() {
  for (const n of NODES) {
    const p = nodePos(n);
    const div = document.createElement("div");
    div.className = "node " + n.zone;
    div.style.left = p.x + "px";
    div.style.top  = p.y + "px";
    div.id = "node-" + n.id;

    const img = document.createElement("img");
    img.alt = n.id;
    img.src = "screenshots/" + n.id + ".png";
    img.onerror = () => { img.style.display = "none"; };
    div.appendChild(img);

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = n.id;
    div.appendChild(name);

    canvas.appendChild(div);
  }
}

function colorForZone(z) {
  return { auth: "cyan", student: "green", teacher: "orange", admin: "red", shared: "grey" }[z] || "grey";
}

// counter for per-pair offset so multiple edges between same pair fan out
function pairKey(a, b) { return a + "->" + b; }

function drawEdges() {
  const NS = "http://www.w3.org/2000/svg";
  const lookup = Object.fromEntries(NODES.map(n => [n.id, n]));
  // group edges by undirected pair to apply curve offsets
  const pairCount = {};
  for (const e of EDGES) {
    const k = [e.from, e.to].sort().join("|");
    pairCount[k] = (pairCount[k] || 0) + 1;
  }
  const pairIndex = {};
  EDGES.forEach((e, idx) => {
    const k = [e.from, e.to].sort().join("|");
    pairIndex[k] = (pairIndex[k] || 0);
    e._pairKey = k;
    e._pairIdx = pairIndex[k]++;
    e._pairTotal = pairCount[k];
  });

  for (const e of EDGES) {
    const a = nodePos(lookup[e.from]);
    const b = nodePos(lookup[e.to]);
    if (!a || !b) continue;

    const dx = b.cx - a.cx, dy = b.cy - a.cy;
    const len = Math.hypot(dx, dy) || 1;
    // perpendicular offset for stacking
    const idx = e._pairIdx;
    const total = e._pairTotal;
    const slot = idx - (total - 1) / 2;            // -1.5, -0.5, 0.5, 1.5
    const baseOffset = 22;                          // px curve depth per slot
    const off = slot * baseOffset + (e.back ? 30 : -10);
    const nx = -dy / len, ny = dx / len;
    const mx = (a.cx + b.cx) / 2 + nx * off;
    const my = (a.cy + b.cy) / 2 + ny * off;

    const color = colorForZone(e.zone);
    const path = document.createElementNS(NS, "path");
    path.setAttribute("d", `M ${a.cx} ${a.cy} Q ${mx} ${my} ${b.cx} ${b.cy}`);
    path.setAttribute("class", e.zone + (e.back ? " back" : ""));
    path.setAttribute("marker-end", `url(#arrow-${color})`);
    path.dataset.back = e.back ? "1" : "0";
    const titleEl = document.createElementNS(NS, "title");
    titleEl.textContent = `${e.from} → ${e.to} : ${e.label}`;
    path.appendChild(titleEl);
    svg.appendChild(path);

    const text = document.createElementNS(NS, "text");
    text.setAttribute("x", mx);
    text.setAttribute("y", my);
    text.setAttribute("text-anchor", "middle");
    text.setAttribute("class", "edge-label");
    text.dataset.back = e.back ? "1" : "0";
    text.textContent = e.label;
    svg.appendChild(text);
  }
}

drawZones();
drawNodes();
drawEdges();

// ===== Toggles =====
document.getElementById("toggle-labels").addEventListener("change", (ev) => {
  document.querySelectorAll("svg.edges text.edge-label").forEach(t => {
    t.style.display = ev.target.checked ? "" : "none";
  });
});
document.getElementById("toggle-back").addEventListener("change", (ev) => {
  const show = ev.target.checked;
  document.querySelectorAll("svg.edges path").forEach(p => {
    if (p.dataset.back === "1") p.style.display = show ? "" : "none";
  });
  document.querySelectorAll("svg.edges text.edge-label").forEach(t => {
    if (t.dataset.back === "1") t.style.display = show ? (document.getElementById("toggle-labels").checked ? "" : "none") : "none";
  });
});
</script>

</body>
</html>
